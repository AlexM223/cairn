# Vault E2E emulator stack (bead cairn-a4k).
#
# All host ports are SHIFTED from the defaults on purpose: a previous
# hardware-emulation session (see C:\dev\cairn\.hw-emu-test\README.md) left
# containers running on the default ports (18443, 21325, 5000, 9001, ...).
# This stack never collides with them and can run side by side.
#
#   docker compose -p vault-e2e -f docker-compose.yml up -d
#   node setup-trezor.mjs        # after trezor container is up (starts emulator+bridge)
#   docker compose -p vault-e2e -f docker-compose.yml down
#
# Host port map:
#   bitcoind RPC        127.0.0.1:18543   (user vaulte2e / pass vaulte2e)
#   trezor controller   ws://127.0.0.1:29001
#   trezor dashboard    http://127.0.0.1:29002
#   trezor bridge       http://127.0.0.1:31325   (via in-container proxy, see setup-trezor.mjs)
#   speculos API/auto   http://127.0.0.1:25000
#   speculos APDU TCP   127.0.0.1:40001

services:
  bitcoind:
    # Official Bitcoin Core image (maintained by the Bitcoin Core project on
    # Docker Hub). 28.0 is already cached on this host and was proven against
    # this exact emulator toolchain by the prior session; 29.x would also work.
    image: bitcoin/bitcoin:28.0
    container_name: vault-e2e-bitcoind
    command:
      - -regtest=1
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcport=18443
      - -rpcuser=vaulte2e
      - -rpcpassword=vaulte2e
      - -txindex=1
      - -fallbackfee=0.0001
    ports:
      - "18543:18443"

  trezor:
    image: ghcr.io/trezor/trezor-user-env:latest
    container_name: vault-e2e-trezor
    environment:
      # Makes trezor-user-env skip Linux-only assumptions; required on
      # Windows/macOS Docker Desktop (prior session's finding).
      MACOS: "1"
    ports:
      - "29001:9001"   # controller websocket (JSON commands)
      - "29002:9002"   # dashboard / http
      # trezord-go (legacy bridge 2.0.33) binds 127.0.0.1:21325 INSIDE the
      # container, which Docker port-forwarding cannot reach. setup-trezor.mjs
      # copies a tiny TCP proxy into the container that listens on
      # 0.0.0.0:21327 -> 127.0.0.1:21325; we publish that.
      - "31325:21327"

  speculos:
    image: ghcr.io/ledgerhq/speculos:latest
    container_name: vault-e2e-speculos
    command:
      - --model
      - nanosp
      - /speculos/apps/app.elf
      - --seed
      - "glory promote mansion idle axis finger extra february uncover one trip resource lawn turtle enact monster seven myth punch hobo dawn victory error impact"
      - --display
      - headless
      - --apdu-port
      - "40000"
      - --api-port
      - "5000"
    volumes:
      - ./assets/ledger-app-nanosp:/speculos/apps:ro
    ports:
      - "25000:5000"   # REST API + automation (button presses, events, screenshot)
      - "40001:40000"  # raw APDU TCP
