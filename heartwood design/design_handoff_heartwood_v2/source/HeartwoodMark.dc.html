<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  @keyframes hwSweep{0%{transform:scale(.13);opacity:0}12%{opacity:.85}100%{transform:scale(1);opacity:0}}
  @keyframes hwCorePulse{0%,100%{opacity:.9}50%{opacity:1}}
  [data-motion="false"] *{animation-play-state:paused!important}
</style>
</helmet>
<svg viewBox="0 0 100 100" width="{{ size }}" height="{{ size }}" style="overflow:visible;display:block;">
  <sc-for list="{{ rings }}" as="r" hint-placeholder-count="8">
    <ellipse cx="{{ r.cx }}" cy="{{ r.cy }}" rx="{{ r.rx }}" ry="{{ r.ry }}" fill="none" stroke="{{ stroke }}" stroke-width="{{ r.w }}" opacity="{{ r.o }}"></ellipse>
  </sc-for>
  <sc-if value="{{ sweepShow }}" hint-placeholder-val="{{ false }}">
    <circle cx="49.3" cy="46" r="45" fill="none" stroke="{{ sweepColor }}" stroke-width="1.3" opacity="0" style="transform-box:fill-box;transform-origin:center;animation:hwSweep 4.4s ease-out infinite"></circle>
  </sc-if>
  <sc-if value="{{ coreShow }}" hint-placeholder-val="{{ true }}">
    <circle cx="49.3" cy="46" r="{{ coreR }}" fill="{{ coreColor }}" style="{{ coreStyle }}"></circle>
  </sc-if>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 150, &quot;height&quot;: 150},
  &quot;size&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 120, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 16, &quot;max&quot;: 400, &quot;unit&quot;: &quot;px&quot;, &quot;label&quot;: &quot;Size&quot;},
  &quot;tone&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;copper&quot;, &quot;options&quot;: [&quot;copper&quot;, &quot;cream&quot;, &quot;ink&quot;, &quot;mono&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;label&quot;: &quot;Tone&quot;},
  &quot;detail&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;full&quot;, &quot;options&quot;: [&quot;full&quot;, &quot;simple&quot;, &quot;min&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;label&quot;: &quot;Detail&quot;},
  &quot;core&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;label&quot;: &quot;Show core&quot;},
  &quot;sweep&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;label&quot;: &quot;New-ring sweep&quot;}
}">
class Component extends DCLogic {
  renderVals() {
    const size = this.props.size ?? 120;
    const detail = this.props.detail || 'full';
    const tone = this.props.tone || 'copper';

    // [radius, strokeWidth, opacity] — alternating bold/hair bands like earlywood/latewood
    const defs = detail === 'min'
      ? [[43, 3.2, 0.95], [28, 2.6, 0.82], [15, 2.4, 0.82]]
      : detail === 'simple'
      ? [[44, 2.4, 0.95], [36, 1.2, 0.6], [27.5, 1.9, 0.85], [18.5, 1.2, 0.6], [10.5, 1.7, 0.8]]
      : [[45, 2.3, 0.95], [39.5, 0.9, 0.5], [34, 1.7, 0.9], [28.5, 0.9, 0.5], [23, 1.7, 0.9], [17.5, 0.9, 0.5], [12, 1.5, 0.85], [6.8, 0.9, 0.52]];

    // eccentric: pith sits up-left, rings drift down-right as they grow (real heartwood)
    const rings = defs.map(([r, w, o]) => {
      const t = r / 45;
      return { cx: (49 + t * 2).toFixed(2), cy: (45 + t * 7).toFixed(2), rx: r, ry: (r * 0.955).toFixed(2), w, o };
    });

    const toneMap = {
      copper: { stroke: '#E8935A', core: '#FFE9CE', glow: 'drop-shadow(0 0 3px rgba(232,147,90,.85))' },
      cream:  { stroke: '#F1E4D6', core: '#FFFFFF', glow: 'drop-shadow(0 0 2px rgba(255,240,225,.5))' },
      ink:    { stroke: '#241812', core: '#3A241A', glow: 'none' },
      mono:   { stroke: '#E8935A', core: '#E8935A', glow: 'none' }
    };
    const tm = toneMap[tone] || toneMap.copper;
    const coreR = detail === 'min' ? 5.5 : detail === 'simple' ? 4 : 3.4;

    return {
      size, rings,
      stroke: tm.stroke,
      coreShow: String(this.props.core) !== 'false',
      coreColor: tm.core, coreR, coreStyle: 'filter:' + tm.glow,
      sweepShow: String(this.props.sweep) === 'true',
      sweepColor: tm.core
    };
  }
}
</script>
</body>
</html>
