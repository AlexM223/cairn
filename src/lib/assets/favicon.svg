	<ellipse cx="50.244" cy="49.356" rx="28" ry="26.74" fill="none" stroke="#E8935A" stroke-width="2.6" opacity="0.82"/>
	<ellipse cx="49.667" cy="47.333" rx="15" ry="14.325" fill="none" stroke="#E8935A" stroke-width="2.4" opacity="0.82"/>
	<circle cx="49.3" cy="46" r="5.5" fill="#FFE9CE"/>
</svg>
