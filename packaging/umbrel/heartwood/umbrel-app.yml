manifestVersion: 1
id: heartwood
category: bitcoin
name: Heartwood
version: "0.2.17"
tagline: Your self-hosted Bitcoin command center
description: >-
  Heartwood is a self-hosted Bitcoin command center: a block explorer,
  watch-only wallets, PSBT construction, hardware-wallet signing, multisig,
  and multi-user access with passkeys — all running against your own node.


  First run: open the app and sign in with the username and password shown
  on this page (Umbrel fills them in for you). You'll immediately be asked to
  set your own email and password — the initial credentials are single-use and
  cannot be reused.


  Hardware-wallet signing (WebHID/WebSerial) requires a browser secure context,
  so it is served over HTTPS at https://<your-umbrel-host>:4488. Your browser
  will warn about the self-signed certificate that Heartwood generates on first
  boot — accept it to continue. Everything else works over the normal app URL.


  Chain backend: Heartwood connects to your own Electrum server or Bitcoin Core
  RPC. Configure this under Settings → Chain Backend after logging in; no
  external services are contacted.


  Solo mining: point a Bitaxe or small ASIC at your own node under Heartwood's
  built-in Stratum V1 pool (Mining tab) — any user on the instance can mine
  under their own opaque mining ID, and a found block pays that miner's own
  wallet in full, non-custodially. Requires Bitcoin Core RPC (the bitcoin
  app) to be installed and connected.
releaseNotes: >-
  This release adds risk warnings and dollar amounts to make wallets easier
  to read at a glance: multisig wallets now show a plain-language risk panel
  when a signing threshold is unusually tight, and send/receive/activity/
  explorer screens display dollar equivalents alongside sats. The Umbrel
  auto-connect probe from the last release now goes further — Heartwood can
  detect a local Bitcoin Core node and offer an assisted connect with a
  provenance card explaining what was found, instead of a manual-only setup.
  Several confusing or duplicated banners across the sign-in, wallet-creation,
  and explorer pages were consolidated into one consistent style. This
  release also hardens transaction correctness: stricter SIGHASH_ALL
  enforcement, validated cosigner finalization, and corrected handling of
  transactions that get replaced or double-spent, backed by a substantially
  larger automated test suite. It also adds a built-in solo-mining pool
  (Mining tab): point a Bitaxe or small ASIC at your own node and, on the
  rare win, the full block reward pays directly into your own wallet — no
  custody, no fees, no pooling of rewards across users. Full changelog:
  https://github.com/AlexM223/cairn/releases/tag/v0.2.17
developer: Alex Martinez
