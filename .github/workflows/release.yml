# Builds and publishes the multi-arch Docker image to GHCR on every v* tag.
#
# Each platform builds natively (amd64 on ubuntu-24.04, arm64 on
# ubuntu-24.04-arm — no QEMU, which matters because `npm ci` compiles the
# native `usb` addon) and pushes by digest; the merge job stitches the digests
# into one manifest list tagged with the version.
#
# Umbrel packaging pins `ghcr.io/alexm223/cairn:<version>@sha256:<digest>`,
# where <digest> is the manifest-list digest printed by the merge job.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/alexm223/cairn

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          docker buildx imagetools create -t "${IMAGE}:${VERSION}" \
            $(printf "${IMAGE}@sha256:%s " *)
          echo "=== pin this in umbrel docker-compose.yml ==="
          docker buildx imagetools inspect "${IMAGE}:${VERSION}"
